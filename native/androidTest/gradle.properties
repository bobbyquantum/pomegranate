# PomegranateDB Android Test — Gradle properties

org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true

android.useAndroidX=true

# Architecture filters (x86_64 for emulator, arm64 for device)
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# New Architecture (TurboModules / Fabric) — default since RN 0.78
newArchEnabled=true

# Use Hermes engine
hermesEnabled=true
