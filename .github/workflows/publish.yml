name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # for npm provenance

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build && npm run build:expo-plugin

      - name: Run tests
        run: npx jest

      - name: Publish to npm
        run: npm publish --access public --provenance
