name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint + type-check ──────────────────────────────────────────────────────

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

  # ─── Pack dry-run ───────────────────────────────────────────────────────────
  # Smoke-test that the package can be packed cleanly on every PR.

  pack-dry-run:
    name: npm pack (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build && npm run build:expo-plugin

      - name: Dry-run pack (shows tarball contents)
        run: npm pack --dry-run

  # ─── Unit tests ─────────────────────────────────────────────────────────────

  test:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (with coverage)
        run: npx jest --coverage --coverageReporters=lcov --coverageReporters=text-summary

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Build ──────────────────────────────────────────────────────────────────

  build:
    name: TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Build expo-plugin
        run: npm run build:expo-plugin

  # ─── Expo web e2e ───────────────────────────────────────────────────────────

  e2e-expo-web:
    name: "Web e2e · ${{ matrix.adapter }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [loki-idb]
        # NOTE: expo-sqlite on web requires a bundler that handles .wasm imports
        # inside Web Workers (e.g. webpack).  Metro can't resolve the wa-sqlite
        # WASM module, so web expo-sqlite is excluded until Metro adds support.
    defaults:
      run:
        working-directory: demos/expo-todo
    env:
      EXPO_PUBLIC_ADAPTER: ${{ matrix.adapter }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.adapter }}
          path: demos/expo-todo/playwright-report/
          retention-days: 7

  # ─── iOS Simulator e2e (Maestro) ────────────────────────────────────────────
  #
  # Builds the Expo demo app for iOS Simulator and runs Maestro flows.

  e2e-ios:
    name: "iOS e2e · ${{ matrix.adapter }}"
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        adapter: [loki-memory, expo-sqlite, op-sqlite, native-sqlite]
    defaults:
      run:
        working-directory: demos/expo-todo
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_ADAPTER: ${{ matrix.adapter }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # ── Build the library ───────────────────────────────────────────
      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      # native-sqlite (JSI) needs the SQLite amalgamation header in the tarball.
      # Android compiles it too; iOS links system SQLite but still needs sqlite3.h.
      - name: Download SQLite amalgamation
        run: |
          chmod +x scripts/setup-sqlite
          ./scripts/setup-sqlite
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      # ── Prepare the demo app ────────────────────────────────────────
      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      # ExpoModulesCore 55.x (swift_version='6.0') uses @MainActor
      # conformance annotations (Swift 6-only syntax) AND has concurrency
      # violations that are hard errors in Swift 6 mode (where
      # SWIFT_STRICT_CONCURRENCY=minimal is ignored by design).
      #
      # Fix: patch out the two @MainActor conformance annotations so the
      # code parses in Swift 5 mode.  Then override SWIFT_VERSION to 5.0
      # for ExpoModulesCore so concurrency issues become warnings, not
      # errors, under minimal concurrency checking.
      - name: Patch ExpoModulesCore for Swift 5 compat
        run: |
          EMC=node_modules/expo-modules-core/ios
          # 1) Remove @MainActor conformance attribute (Swift-6-only syntax)
          sed -i '' 's/@MainActor AnyExpoSwiftUIHostingView/AnyExpoSwiftUIHostingView/' \
            "$EMC/Core/Views/SwiftUI/SwiftUIHostingView.swift"
          sed -i '' 's/extension UIView: @MainActor AnyArgument/extension UIView: AnyArgument/' \
            "$EMC/Core/Views/ViewDefinition.swift"
          echo "Patched out @MainActor conformance annotations"

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      # Override SWIFT_VERSION to 5.0 for ExpoModulesCore (the podspec
      # sets 6.0 which makes concurrency violations hard errors).
      - name: Podfile – force Swift 5 for ExpoModulesCore
        run: |
          cd ios
          ruby -e "
            podfile = File.read('Podfile')
            patch = <<~'RUBY'
              # --- CI patch: compile ExpoModulesCore in Swift 5 mode ---
              installer.pods_project.targets.each do |target|
                if target.name == 'ExpoModulesCore'
                  target.build_configurations.each do |config|
                    config.build_settings['SWIFT_VERSION'] = '5.0'
                  end
                end
              end
            RUBY
            podfile.sub!('react_native_post_install(', patch + \"\\n    react_native_post_install(\")
            File.write('Podfile', podfile)
          "
          echo '--- Patched Podfile ---'
          grep -A 8 'CI patch' Podfile || true
          pod install

      # Expo prebuild sets export SKIP_BUNDLING=1 for Debug builds in
      # the "Bundle React Native code" script phase, before invoking the
      # actual bundle script. The script also sources .xcode.env.updates
      # specifically to allow this to be overridden.
      - name: Enable JS bundling for CI
        run: |
          echo 'unset SKIP_BUNDLING'    >  ios/.xcode.env.updates
          echo 'export FORCE_BUNDLING=1' >> ios/.xcode.env.updates
          cat ios/.xcode.env.updates

      # ── Discover simulator UDID ─────────────────────────────────────
      - name: Select iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          preferred = []
          fallback = []
          for runtime, devs in data['devices'].items():
            if 'iOS' not in runtime:
              continue
            for d in devs:
              if not d['isAvailable']:
                continue
              if 'iPhone 16' in d['name']:
                preferred.append(d['udid'])
              elif 'iPhone' in d['name']:
                fallback.append(d['udid'])
          result = preferred[0] if preferred else (fallback[0] if fallback else '')
          print(result)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Selected simulator: $UDID"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID"

      # ── Build for simulator ─────────────────────────────────────────
      - name: Build iOS app (Simulator)
        run: |
          set -o pipefail
          WORKSPACE=$(find ios -name '*.xcworkspace' -maxdepth 1 | head -1)
          # The scheme name matches the Xcode project name (set by expo prebuild)
          SCHEME="PomegranateDBTodo"
          echo "Building workspace=$WORKSPACE scheme=$SCHEME udid=$SIMULATOR_UDID"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee /tmp/xcode.log
          exit ${PIPESTATUS[0]}
        env:
          NSUnbufferedIO: YES

      # ── Install into the already-booted simulator ───────────────────
      - name: Install app in simulator
        run: |
          # The build step used  -derivedDataPath ios/build -configuration Release
          # so the .app bundle is under ios/build/Build/Products/Release-iphonesimulator/.
          # Exclude any *Tests.app bundles which lack CFBundleIdentifier (exit 65).
          PRODUCTS_DIR="ios/build/Build/Products/Release-iphonesimulator"
          echo "Looking for .app in $PRODUCTS_DIR …"
          ls -la "$PRODUCTS_DIR/" 2>/dev/null || true
          APP_PATH=$(find "$PRODUCTS_DIR" -maxdepth 1 -name '*.app' \
            -not -name '*Tests*' -type d | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: no .app found under $PRODUCTS_DIR" >&2
            find ios/build -name '*.app' -type d 2>/dev/null >&2 || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH"
          # Verify bundle ID is present (diagnoses exit-65 'Missing bundle ID')
          BID=$(plutil -extract CFBundleIdentifier raw "$APP_PATH/Info.plist" 2>/dev/null || echo '')
          echo "CFBundleIdentifier=$BID"
          if [ -z "$BID" ]; then
            echo "ERROR: CFBundleIdentifier is empty — simctl install will fail" >&2
            plutil -p "$APP_PATH/Info.plist" >&2 || true
            exit 1
          fi
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      # ── Maestro ─────────────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          xcrun simctl launch "$SIMULATOR_UDID" com.pomegranatedb.todo.demo
          sleep 15

          # Diagnostics: what does the app show?
          echo "=== Simulator screenshot ==="
          xcrun simctl io "$SIMULATOR_UDID" screenshot /tmp/ios-screenshot.png 2>/dev/null || true

          echo "=== App console log (last 60 lines) ==="
          xcrun simctl spawn "$SIMULATOR_UDID" log show \
            --predicate 'subsystem == "com.pomegranatedb.todo.demo" OR process == "PomegranateDBTodo"' \
            --last 30s --style compact 2>/dev/null | tail -60 || true

          echo "=== Contents of .app bundle ==="
          ls -la ios/build/Build/Products/Release-iphonesimulator/PomegranateDBTodo.app/ 2>/dev/null | head -20 || true

          maestro test maestro/

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-ios-${{ matrix.adapter }}
          path: |
            ~/.maestro/tests/
            /tmp/ios-screenshot.png
          retention-days: 7

  # ─── Android Emulator e2e (Maestro) ─────────────────────────────────────────
  #
  # Builds the Expo demo app for Android and runs the same Maestro flows as iOS.
  # ubuntu-latest has KVM support, making emulator startup ~3× faster than macOS.

  e2e-android:
    name: "Android e2e · ${{ matrix.adapter }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [loki-memory, expo-sqlite, op-sqlite, native-sqlite]
    defaults:
      run:
        working-directory: demos/expo-todo
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_ADAPTER: ${{ matrix.adapter }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Enable KVM for hardware-accelerated emulator ────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Build the library ───────────────────────────────────────────
      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Download SQLite amalgamation
        run: |
          chmod +x scripts/setup-sqlite
          ./scripts/setup-sqlite
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      # ── Prepare the demo app ────────────────────────────────────────
      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean

      # Force-bundle JS into the debug APK (no Metro server in CI)
      # debuggableVariants=[] makes the gradle plugin bundle JS into the APK
      - name: Force JS bundling for debug
        run: |
          sed -i '/^react {/a\    debuggableVariants = []' android/app/build.gradle

      # Disable dev support so the app loads the bundled JS instead of trying Metro
      - name: Disable dev mode for CI
        run: |
          find android -name 'MainApplication.kt' -exec \
            sed -i 's/getUseDeveloperSupport(): Boolean = BuildConfig.DEBUG/getUseDeveloperSupport(): Boolean = false/' {} \;

      - name: Build Android APK (debug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: demos/expo-todo/android

      # ── Install Maestro ─────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Launch emulator, install APK, run Maestro flows ─────────────
      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install "$(find demos/expo-todo/android/app/build/outputs/apk/debug -name '*.apk' | head -1)"
            adb shell am start -n com.pomegranatedb.todo.demo/.MainActivity
            sleep 20

            echo "=== JS LOGCAT ==="
            adb logcat -d ReactNativeJS:V '*:S' | tail -40 || true

            echo "=== ERROR LOGCAT ==="
            adb logcat -d '*:E' | grep -i 'react\|js\|bundle\|fatal' | tail -30 || true

            echo "=== UI HIERARCHY ==="
            adb exec-out uiautomator dump /dev/tty 2>/dev/null || true
            echo ""

            echo "=== SCREENSHOT ==="
            adb exec-out screencap -p > /tmp/app-screenshot.png 2>/dev/null || true

            $HOME/.maestro/bin/maestro test --debug-output /tmp/maestro-debug demos/expo-todo/maestro/

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-report-${{ matrix.adapter }}
          path: |
            ~/.maestro/tests/
            /tmp/maestro-debug/
            /tmp/app-screenshot.png
          retention-days: 7

  # ─── Bare RN iOS Simulator e2e (Maestro) ──────────────────────────────────
  #
  # Builds the bare React Native demo app (no Expo) for iOS Simulator.

  e2e-bare-ios:
    name: "Bare RN iOS · ${{ matrix.adapter }}"
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        adapter: [loki-memory, op-sqlite, native-sqlite]
    defaults:
      run:
        working-directory: demos/bare-rn-todo
    timeout-minutes: 45
    env:
      ADAPTER: ${{ matrix.adapter }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # ── Build the library ───────────────────────────────────────────
      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Download SQLite amalgamation
        run: |
          chmod +x scripts/setup-sqlite
          ./scripts/setup-sqlite
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      # ── Prepare the demo app ────────────────────────────────────────
      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Pod install
        run: pod install
        working-directory: demos/bare-rn-todo/ios

      # ── Discover simulator UDID ─────────────────────────────────────
      - name: Select iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          preferred = []
          fallback = []
          for runtime, devs in data['devices'].items():
            if 'iOS' not in runtime:
              continue
            for d in devs:
              if not d['isAvailable']:
                continue
              if 'iPhone 16' in d['name']:
                preferred.append(d['udid'])
              elif 'iPhone' in d['name']:
                fallback.append(d['udid'])
          result = preferred[0] if preferred else (fallback[0] if fallback else '')
          print(result)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Selected simulator: $UDID"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID"

      # ── Build for simulator ─────────────────────────────────────────
      - name: Build iOS app (Simulator)
        run: |
          set -o pipefail
          WORKSPACE=$(find ios -name '*.xcworkspace' -maxdepth 1 | head -1)
          SCHEME="BareRNTodo"
          echo "Building workspace=$WORKSPACE scheme=$SCHEME udid=$SIMULATOR_UDID"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcode.log
          exit ${PIPESTATUS[0]}
        env:
          NSUnbufferedIO: YES

      # ── Install into the already-booted simulator ───────────────────
      - name: Install app in simulator
        run: |
          PRODUCTS_DIR="ios/build/Build/Products/Release-iphonesimulator"
          echo "Looking for .app in $PRODUCTS_DIR …"
          ls -la "$PRODUCTS_DIR/" 2>/dev/null || true
          APP_PATH=$(find "$PRODUCTS_DIR" -maxdepth 1 -name '*.app' \
            -not -name '*Tests*' -type d | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: no .app found under $PRODUCTS_DIR" >&2
            find ios/build -name '*.app' -type d 2>/dev/null >&2 || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH"
          BID=$(plutil -extract CFBundleIdentifier raw "$APP_PATH/Info.plist" 2>/dev/null || echo '')
          echo "CFBundleIdentifier=$BID"
          if [ -z "$BID" ]; then
            echo "ERROR: CFBundleIdentifier is empty" >&2
            exit 1
          fi
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      # ── Maestro ─────────────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          xcrun simctl launch "$SIMULATOR_UDID" com.barerntodo
          sleep 15

          echo "=== Simulator screenshot ==="
          xcrun simctl io "$SIMULATOR_UDID" screenshot /tmp/ios-screenshot.png 2>/dev/null || true

          echo "=== App console log (last 60 lines) ==="
          xcrun simctl spawn "$SIMULATOR_UDID" log show \
            --predicate 'subsystem == "com.barerntodo" OR process == "BareRNTodo"' \
            --last 30s --style compact 2>/dev/null | tail -60 || true

          maestro test maestro/

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-bare-ios-${{ matrix.adapter }}
          path: |
            ~/.maestro/tests/
            /tmp/ios-screenshot.png
          retention-days: 7

  # ─── Bare RN Android Emulator e2e (Maestro) ─────────────────────────────────

  e2e-bare-android:
    name: "Bare RN Android · ${{ matrix.adapter }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [loki-memory, op-sqlite, native-sqlite]
    defaults:
      run:
        working-directory: demos/bare-rn-todo
    timeout-minutes: 60
    env:
      ADAPTER: ${{ matrix.adapter }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Enable KVM for hardware-accelerated emulator ────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Build the library ───────────────────────────────────────────
      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Download SQLite amalgamation
        run: |
          chmod +x scripts/setup-sqlite
          ./scripts/setup-sqlite
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      # ── Prepare the demo app ────────────────────────────────────────
      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Build Android APK (release)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        working-directory: demos/bare-rn-todo/android

      # ── Install Maestro ─────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Launch emulator, install APK, run Maestro flows ─────────────
      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install "$(find demos/bare-rn-todo/android/app/build/outputs/apk/release -name '*.apk' | head -1)"
            adb shell am start -n com.barerntodo/.MainActivity
            sleep 20

            echo "=== JS LOGCAT ==="
            adb logcat -d ReactNativeJS:V '*:S' | tail -40 || true

            echo "=== ERROR LOGCAT ==="
            adb logcat -d '*:E' | grep -i 'react\|js\|bundle\|fatal' | tail -30 || true

            echo "=== UI HIERARCHY ==="
            adb exec-out uiautomator dump /dev/tty 2>/dev/null || true
            echo ""

            echo "=== SCREENSHOT ==="
            adb exec-out screencap -p > /tmp/app-screenshot.png 2>/dev/null || true

            $HOME/.maestro/bin/maestro test --debug-output /tmp/maestro-debug demos/bare-rn-todo/maestro/

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-bare-android-report-${{ matrix.adapter }}
          path: |
            ~/.maestro/tests/
            /tmp/maestro-debug/
            /tmp/app-screenshot.png
          retention-days: 7

  # ─── Podspec lint ────────────────────────────────────────────────────────────
  #
  # Uses macOS to validate that the podspec metadata is well-formed.
  # Full compilation validation requires pods to be installed (see iosTest TODO).

  podspec-lint:
    name: Podspec lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Lint podspec (metadata only)
        run: pod spec lint PomegranateDB.podspec --allow-warnings --quick
        # --quick skips compilation, which needs React-Core pods installed.
        # Real compilation test happens in the iosTest project (TODO).
