name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint + type-check ──────────────────────────────────────────────────────

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

  # ─── Pack dry-run ───────────────────────────────────────────────────────────
  # Smoke-test that the package can be packed cleanly on every PR.

  pack-dry-run:
    name: npm pack (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build && npm run build:expo-plugin

      - name: Dry-run pack (shows tarball contents)
        run: npm pack --dry-run

  # ─── Unit tests ─────────────────────────────────────────────────────────────

  test:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (with coverage)
        run: npx jest --coverage --coverageReporters=lcov --coverageReporters=text-summary

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Build ──────────────────────────────────────────────────────────────────

  build:
    name: TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Build expo-plugin
        run: npm run build:expo-plugin

  # ─── Expo web e2e ───────────────────────────────────────────────────────────

  e2e-expo-web:
    name: Expo web e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/expo-todo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: demos/expo-todo/playwright-report/
          retention-days: 7

  # ─── iOS Simulator e2e (Maestro) ────────────────────────────────────────────
  #
  # Builds the Expo demo app for iOS Simulator using EAS Build (local mode)
  # and runs Maestro UI test flows.

  e2e-ios:
    name: iOS e2e (Maestro)
    runs-on: macos-15
    defaults:
      run:
        working-directory: demos/expo-todo
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_ADAPTER: loki-memory
      EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # ── Build the library ───────────────────────────────────────────
      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      # ── Build with EAS (local) ──────────────────────────────────────
      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS app (EAS local)
        run: |
          eas build \
            --platform ios \
            --profile simulator \
            --local \
            --output build/PomegranateDBTodo.tar.gz \
            --non-interactive

      - name: Extract .app from build
        run: |
          mkdir -p build/app
          tar -xzf build/PomegranateDBTodo.tar.gz -C build/app
          APP_PATH=$(find build/app -name '*.app' -type d | head -1)
          echo "APP_PATH=$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      # ── Discover simulator UDID ─────────────────────────────────────
      - name: Select iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          preferred = []
          fallback = []
          for runtime, devs in data['devices'].items():
            if 'iOS' not in runtime:
              continue
            for d in devs:
              if not d['isAvailable']:
                continue
              if 'iPhone 16' in d['name']:
                preferred.append(d['udid'])
              elif 'iPhone' in d['name']:
                fallback.append(d['udid'])
          result = preferred[0] if preferred else (fallback[0] if fallback else '')
          print(result)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Selected simulator: $UDID"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID"

      # ── Install & run ───────────────────────────────────────────────
      - name: Install app in simulator
        run: xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          xcrun simctl launch "$SIMULATOR_UDID" com.pomegranatedb.todo.demo
          sleep 15
          maestro test maestro/

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-report
          path: |
            ~/.maestro/tests/
          retention-days: 7

  # ─── Android Emulator e2e (Maestro) ─────────────────────────────────────────
  #
  # Builds the Expo demo app for Android using EAS Build (local mode)
  # and runs Maestro UI test flows on an emulator.

  e2e-android:
    name: Android e2e (Maestro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/expo-todo
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_ADAPTER: loki-memory
      EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Enable KVM for hardware-accelerated emulator ────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Build the library ───────────────────────────────────────────
      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Download SQLite amalgamation
        run: |
          chmod +x scripts/setup-sqlite
          ./scripts/setup-sqlite
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      # ── Build with EAS (local) ──────────────────────────────────────
      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Generate debug keystore & credentials
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CI,OU=CI,O=CI,L=CI,S=CI,C=US"
          cat > credentials.json <<'EOF'
          {
            "android": {
              "keystore": {
                "keystorePath": "debug.keystore",
                "keystorePassword": "android",
                "keyAlias": "debug",
                "keyPassword": "android"
              }
            }
          }
          EOF

      - name: Build Android APK (EAS local)
        run: |
          eas build \
            --platform android \
            --profile preview \
            --local \
            --output build/PomegranateDBTodo.apk \
            --non-interactive

      # ── Install Maestro ─────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Launch emulator, install APK, run Maestro flows ─────────────
      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: default
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install demos/expo-todo/build/PomegranateDBTodo.apk
            adb shell am start -n com.pomegranatedb.todo.demo/.MainActivity
            sleep 20
            $HOME/.maestro/bin/maestro test --debug-output /tmp/maestro-debug demos/expo-todo/maestro/

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-report
          path: |
            ~/.maestro/tests/
            /tmp/maestro-debug/
          retention-days: 7

  # ─── Podspec lint ────────────────────────────────────────────────────────────
  #
  # Uses macOS to validate that the podspec metadata is well-formed.
  # Full compilation validation requires pods to be installed (see iosTest TODO).

  podspec-lint:
    name: Podspec lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Lint podspec (metadata only)
        run: pod spec lint PomegranateDB.podspec --allow-warnings --quick
        # --quick skips compilation, which needs React-Core pods installed.
        # Real compilation test happens in the iosTest project (TODO).
