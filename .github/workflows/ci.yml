name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint + type-check ──────────────────────────────────────────────────────

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

  # ─── Unit tests ─────────────────────────────────────────────────────────────

  test:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (with coverage)
        run: npx jest --coverage --coverageReporters=lcov --coverageReporters=text-summary

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Pack library (shared by all e2e jobs) ─────────────────────────────────
  #
  # Builds the library, downloads the SQLite amalgamation, packs the tarball,
  # and uploads it as an artifact so every e2e job can skip the build step.

  pack-library:
    name: Pack library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Build expo-plugin
        run: npm run build:expo-plugin

      # Cache the SQLite amalgamation (9 MB .c + .h) to avoid downloading
      # on every run.  Key on the version embedded in the setup script.
      - name: Cache SQLite amalgamation
        id: cache-sqlite
        uses: actions/cache@v4
        with:
          path: native/shared/sqlite3
          key: sqlite-${{ hashFiles('scripts/setup-sqlite') }}

      - name: Download SQLite amalgamation
        if: steps.cache-sqlite.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-sqlite
          ./scripts/setup-sqlite

      - name: Pack library tarball
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: pomegranate-tarball
          path: pomegranate-db-0.1.0.tgz
          retention-days: 1

  # ─── Expo web e2e ───────────────────────────────────────────────────────────

  e2e-expo-web:
    name: "Web e2e · ${{ matrix.adapter }}"
    needs: [pack-library]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        adapter: [loki-idb, expo-sqlite]
    defaults:
      run:
        working-directory: demos/expo-todo
    env:
      EXPO_PUBLIC_ADAPTER: ${{ matrix.adapter }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Download library tarball
        uses: actions/download-artifact@v4
        with:
          name: pomegranate-tarball

      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.adapter }}
          path: demos/expo-todo/playwright-report/
          retention-days: 7

      - name: Upload benchmark data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-expo-web-${{ matrix.adapter }}
          path: demos/expo-todo/benchmark-results/benchmark-result.json
          retention-days: 7


  # ─── Build iOS app (shared by all iOS e2e jobs) ──────────────────────────
  #
  # All adapters are bundled into the same .app — the runtime picker selects
  # which one to use.  Build once, test many.

  build-ios:
    name: Build iOS simulator app
    needs: [pack-library]
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: demos/expo-todo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Download library tarball
        uses: actions/download-artifact@v4
        with:
          name: pomegranate-tarball

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('demos/expo-todo/package.json') }}
          restore-keys: pods-

      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Patch ExpoModulesCore for Swift 5 compat
        run: |
          EMC=node_modules/expo-modules-core/ios
          sed -i '' 's/@MainActor AnyExpoSwiftUIHostingView/AnyExpoSwiftUIHostingView/' \
            "$EMC/Core/Views/SwiftUI/SwiftUIHostingView.swift"
          sed -i '' 's/extension UIView: @MainActor AnyArgument/extension UIView: AnyArgument/' \
            "$EMC/Core/Views/ViewDefinition.swift"
          echo "Patched out @MainActor conformance annotations"

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Podfile – force Swift 5 for ExpoModulesCore
        run: |
          cd ios
          ruby -e "
            podfile = File.read('Podfile')
            patch = <<~'RUBY'
              # --- CI patch: compile ExpoModulesCore in Swift 5 mode ---
              installer.pods_project.targets.each do |target|
                if target.name == 'ExpoModulesCore'
                  target.build_configurations.each do |config|
                    config.build_settings['SWIFT_VERSION'] = '5.0'
                  end
                end
              end
            RUBY
            podfile.sub!('react_native_post_install(', patch + \"\\n    react_native_post_install(\")
            File.write('Podfile', podfile)
          "
          echo '--- Patched Podfile ---'
          grep -A 8 'CI patch' Podfile || true
          pod install

      - name: Enable JS bundling for CI
        run: |
          echo 'unset SKIP_BUNDLING'    >  ios/.xcode.env.updates
          echo 'export FORCE_BUNDLING=1' >> ios/.xcode.env.updates

      - name: Select iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          preferred = []
          fallback = []
          for runtime, devs in data['devices'].items():
            if 'iOS' not in runtime:
              continue
            for d in devs:
              if not d['isAvailable']:
                continue
              if 'iPhone 16' in d['name']:
                preferred.append(d['udid'])
              elif 'iPhone' in d['name']:
                fallback.append(d['udid'])
          result = preferred[0] if preferred else (fallback[0] if fallback else '')
          print(result)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID"

      - name: Build iOS app (Simulator)
        run: |
          set -o pipefail
          WORKSPACE=$(find ios -name '*.xcworkspace' -maxdepth 1 | head -1)
          SCHEME="PomegranateDBTodo"
          echo "Building workspace=$WORKSPACE scheme=$SCHEME udid=$SIMULATOR_UDID"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee /tmp/xcode.log
          exit ${PIPESTATUS[0]}
        env:
          NSUnbufferedIO: YES

      - name: Package simulator .app
        run: |
          PRODUCTS_DIR="ios/build/Build/Products/Release-iphonesimulator"
          APP_PATH=$(find "$PRODUCTS_DIR" -maxdepth 1 -name '*.app' \
            -not -name '*Tests*' -type d | head -1)
          echo "APP_PATH=$APP_PATH"
          tar czf /tmp/ios-app.tar.gz -C "$PRODUCTS_DIR" "$(basename "$APP_PATH")"
          ls -lh /tmp/ios-app.tar.gz

      - name: Upload iOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: /tmp/ios-app.tar.gz
          retention-days: 1

  # ─── iOS Simulator e2e (Maestro) ────────────────────────────────────────────
  #
  # Downloads the pre-built .app and runs Maestro flows with each adapter
  # selected via the in-app picker (--env ADAPTER=xxx).

  e2e-ios:
    name: "iOS e2e · ${{ matrix.adapter }}"
    needs: [build-ios]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [loki-memory, expo-sqlite, op-sqlite, native-sqlite]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Download iOS app artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-app

      - name: Extract .app
        run: |
          mkdir -p /tmp/ios-app
          tar xzf ios-app.tar.gz -C /tmp/ios-app
          APP_PATH=$(find /tmp/ios-app -maxdepth 1 -name '*.app' -type d | head -1)
          echo "APP_PATH=$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Select iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          preferred = []
          fallback = []
          for runtime, devs in data['devices'].items():
            if 'iOS' not in runtime:
              continue
            for d in devs:
              if not d['isAvailable']:
                continue
              if 'iPhone 16' in d['name']:
                preferred.append(d['udid'])
              elif 'iPhone' in d['name']:
                fallback.append(d['udid'])
          result = preferred[0] if preferred else (fallback[0] if fallback else '')
          print(result)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID"

      - name: Install app in simulator
        run: |
          BID=$(plutil -extract CFBundleIdentifier raw "$APP_PATH/Info.plist" 2>/dev/null || echo '')
          echo "CFBundleIdentifier=$BID"
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"

          xcrun simctl spawn "$SIMULATOR_UDID" log stream \
            --level debug --style compact 2>/dev/null > /tmp/ios-console.log &
          LOG_STREAM_PID=$!

          xcrun simctl launch "$SIMULATOR_UDID" com.pomegranatedb.todo.demo
          sleep 15

          xcrun simctl io "$SIMULATOR_UDID" screenshot /tmp/ios-screenshot.png 2>/dev/null || true

          maestro test --env ADAPTER=${{ matrix.adapter }} demos/expo-todo/maestro/

          sleep 2
          kill $LOG_STREAM_PID 2>/dev/null || true
          wait $LOG_STREAM_PID 2>/dev/null || true

      - name: Extract benchmark results
        if: always()
        run: |
          grep "POMEGRANATE_BENCHMARK" /tmp/ios-console.log 2>/dev/null \
            | sed 's/.*\[POMEGRANATE_BENCHMARK\]//' | head -1 > /tmp/benchmark-result.json
          echo "=== Benchmark JSON ==="
          cat /tmp/benchmark-result.json || echo 'No benchmark data found'

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-ios-${{ matrix.adapter }}
          path: |
            ~/.maestro/tests/
            /tmp/ios-screenshot.png
            /tmp/benchmark-result.json
          retention-days: 7

      - name: Upload benchmark data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-expo-ios-${{ matrix.adapter }}
          path: /tmp/benchmark-result.json
          retention-days: 7

  # ─── Build Android APK (shared by all Android e2e jobs) ─────────────────────

  build-android:
    name: Build Android APK
    needs: [pack-library]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: demos/expo-todo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('demos/expo-todo/package.json') }}
          restore-keys: gradle-

      - name: Download library tarball
        uses: actions/download-artifact@v4
        with:
          name: pomegranate-tarball

      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK (release)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        working-directory: demos/expo-todo/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: demos/expo-todo/android/app/build/outputs/apk/release/*.apk
          retention-days: 1

  # ─── Android e2e (Maestro) ──────────────────────────────────────────────────
  #
  # Downloads the pre-built APK and runs Maestro flows on an Android emulator.
  # Adapter is selected at runtime via the in-app picker (--env ADAPTER=xxx).

  e2e-android:
    name: "Android e2e · ${{ matrix.adapter }}"
    needs: [build-android]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [loki-memory, expo-sqlite, op-sqlite, native-sqlite]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk

      - name: Debug APK location
        run: |
          echo "=== Files in current directory ==="
          ls -la
          echo "=== Finding APK files ==="
          find . -type f -name '*.apk' -ls || echo "No APK files found"
          echo "=== Current directory ==="
          pwd
          # Copy APK to workspace root to preserve it from android-emulator-runner
          cp app-release.apk "${{ github.workspace }}/app-release.apk" || true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2.33.0
        with:
          api-level: 29
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell 'while [ "$(getprop sys.boot_completed)" != "1" ]; do sleep 2; done'
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            # Artifact is downloaded to the workspace root as app-release.apk.
            # Use APK from workspace (copied before emulator-runner changes cwd)
            APK_PATH="/home/runner/work/pomegranate/pomegranate/app-release.apk"
            echo "Installing APK from: $APK_PATH"
            ls -la "$APK_PATH" || echo "APK file not found!"
            adb install "$APK_PATH"
            adb shell am start -n com.pomegranatedb.todo.demo/.MainActivity
            sleep 20

            echo "=== JS LOGCAT ==="
            adb logcat -d ReactNativeJS:V '*:S' | tail -40 || true

            echo "=== UI HIERARCHY ==="
            adb exec-out uiautomator dump /dev/tty 2>/dev/null || true

            adb exec-out screencap -p > /tmp/app-screenshot.png 2>/dev/null || true

            $HOME/.maestro/bin/maestro test \
              --env ADAPTER=${{ matrix.adapter }} \
              --debug-output /tmp/maestro-debug \
              demos/expo-todo/maestro/

            adb logcat -d ReactNativeJS:V '*:S' | grep 'POMEGRANATE_BENCHMARK' \
              | sed 's/.*\[POMEGRANATE_BENCHMARK\]//' | head -1 > /tmp/benchmark-result.json
            echo "=== Benchmark JSON ==="
            cat /tmp/benchmark-result.json || echo 'No benchmark data found'

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-report-${{ matrix.adapter }}
          path: |
            ~/.maestro/tests/
            /tmp/maestro-debug/
            /tmp/app-screenshot.png
            /tmp/benchmark-result.json
          retention-days: 7

      - name: Upload benchmark data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-expo-android-${{ matrix.adapter }}
          path: /tmp/benchmark-result.json
          retention-days: 7


  # ─── Podspec lint ────────────────────────────────────────────────────────────
  #
  # Uses macOS to validate that the podspec metadata is well-formed.
  # Full compilation validation requires pods to be installed (see iosTest TODO).

  podspec-lint:
    name: Podspec lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint podspec (metadata only)
        run: pod spec lint PomegranateDB.podspec --allow-warnings --quick
        # --quick skips compilation, which needs React-Core pods installed.
        # Real compilation test happens in the iosTest project (TODO).

  # ─── Benchmark Summary ──────────────────────────────────────────────────────
  #
  # Collects benchmark results from all e2e jobs and renders a summary table
  # in the GitHub Actions job summary.

  benchmark-summary:
    name: Benchmark summary
    needs: [e2e-expo-web, e2e-ios, e2e-android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          path: benchmarks/
          merge-multiple: false

      - name: Generate benchmark summary
        run: |
          cat <<'PYEOF' > generate-summary.py
          import json, glob, os, sys

          rows = []
          for path in sorted(glob.glob("benchmarks/*/benchmark-result.json")):
              try:
                  with open(path) as f:
                      content = f.read().strip()
                  if not content:
                      continue
                  data = json.loads(content)
                  # Derive platform + app from artifact directory name
                  # e.g. benchmarks/benchmark-expo-ios-loki-memory/benchmark-result.json
                  dirname = os.path.basename(os.path.dirname(path))
                  parts = dirname.replace("benchmark-", "").split("-", 2)
                  app = parts[0] if len(parts) > 0 else "?"         # expo / bare
                  platform = parts[1] if len(parts) > 1 else "?"    # ios / android
                  adapter = parts[2] if len(parts) > 2 else "?"     # loki-memory etc.

                  # Support both compact (r/n/o/t/a/s/ms/ad) and full key formats
                  results_raw = data.get("results") or data.get("r") or []
                  total_ms = data.get("totalMs") or data.get("ms", "?")
                  for r in results_raw:
                      rows.append({
                          "app": app,
                          "platform": platform,
                          "adapter": adapter,
                          "operation": r.get("name") or r.get("n", "?"),
                          "total_ms": r.get("totalMs") or r.get("t", 0),
                          "avg_ms": r.get("avgMs") or r.get("a", 0),
                          "ops_per_sec": r.get("opsPerSec") or r.get("s", 0),
                      })
              except Exception as e:
                  print(f"Warning: could not parse {path}: {e}", file=sys.stderr)

          if not rows:
              summary = "## ⚡ Benchmark Results\n\nNo benchmark data collected.\n"
          else:
              # Build markdown table
              lines = ["## ⚡ Benchmark Results\n"]
              lines.append("| App | Platform | Adapter | Operation | Total | Avg | ops/s |")
              lines.append("|-----|----------|---------|-----------|-------|-----|-------|")
              for r in rows:
                  lines.append(
                      f"| {r['app']} | {r['platform']} | {r['adapter']} "
                      f"| {r['operation']} | {r['total_ms']}ms "
                      f"| {r['avg_ms']}ms | {r['ops_per_sec']:,} |"
                  )
              lines.append("")

              # Per-adapter summary
              adapters = {}
              for r in rows:
                  key = f"{r['app']}/{r['platform']}/{r['adapter']}"
                  adapters.setdefault(key, []).append(r)

              lines.append("### Summary by adapter\n")
              lines.append("| App | Platform | Adapter | Total ops/s (avg) |")
              lines.append("|-----|----------|---------|-------------------|")
              for key in sorted(adapters):
                  rs = adapters[key]
                  avg_ops = sum(r["ops_per_sec"] for r in rs) // len(rs)
                  parts = key.split("/")
                  lines.append(f"| {parts[0]} | {parts[1]} | {parts[2]} | {avg_ops:,} |")
              lines.append("")

              # Per-operation comparison across all adapters/platforms
              # This is the key table for comparing providers side-by-side
              operations = []
              seen_ops = set()
              for r in rows:
                  if r["operation"] not in seen_ops:
                      operations.append(r["operation"])
                      seen_ops.add(r["operation"])

              # Build a map: operation -> list of (label, ops_per_sec)
              op_map = {}
              adapter_labels = []
              seen_labels = set()
              for r in rows:
                  label = f"{r['app']}/{r['platform']}/{r['adapter']}"
                  if label not in seen_labels:
                      adapter_labels.append(label)
                      seen_labels.add(label)
                  op_map.setdefault(r["operation"], {})[label] = r

              lines.append("### Comparison by operation\n")
              header = "| Operation |"
              separator = "|-----------|"
              for label in adapter_labels:
                  header += f" {label} |"
                  separator += "----------|"
              lines.append(header)
              lines.append(separator)
              for op in operations:
                  row = f"| {op} |"
                  for label in adapter_labels:
                      r = op_map.get(op, {}).get(label)
                      if r:
                          row += f" {r['avg_ms']}ms ({r['ops_per_sec']:,}/s) |"
                      else:
                          row += " — |"
                  lines.append(row)
              lines.append("")
              summary = "\n".join(lines)

          # Write to job summary
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "a") as f:
              f.write(summary)

          # Also print to stdout for logs
          print(summary)
          PYEOF
          python3 generate-summary.py
