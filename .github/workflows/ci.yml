name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint + type-check ──────────────────────────────────────────────────────

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

  # ─── Pack dry-run ───────────────────────────────────────────────────────────
  # Smoke-test that the package can be packed cleanly on every PR.

  pack-dry-run:
    name: npm pack (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build && npm run build:expo-plugin

      - name: Dry-run pack (shows tarball contents)
        run: npm pack --dry-run

  # ─── Unit tests ─────────────────────────────────────────────────────────────

  test:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (with coverage)
        run: npx jest --coverage --coverageReporters=lcov --coverageReporters=text-summary

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Build ──────────────────────────────────────────────────────────────────

  build:
    name: TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Build expo-plugin
        run: npm run build:expo-plugin

  # ─── Expo web e2e ───────────────────────────────────────────────────────────

  e2e-expo-web:
    name: Expo web e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/expo-todo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: demos/expo-todo/playwright-report/
          retention-days: 7

  # ─── iOS Simulator e2e (Maestro) ────────────────────────────────────────────
  #
  # Builds the Expo demo app for iOS Simulator and runs Maestro flows.

  e2e-ios:
    name: iOS e2e (Maestro)
    runs-on: macos-15
    defaults:
      run:
        working-directory: demos/expo-todo
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_ADAPTER: loki-memory

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # ── Build the library ───────────────────────────────────────────
      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      # ── Prepare the demo app ────────────────────────────────────────
      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      # ── Discover simulator UDID (before xcodebuild so we can pass id:) ──
      - name: Select iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          # Prefer iPhone 16, fall back to any available iPhone simulator
          preferred = []
          fallback = []
          for runtime, devs in data['devices'].items():
            if 'iOS' not in runtime:
              continue
            for d in devs:
              if not d['isAvailable']:
                continue
              if 'iPhone 16' in d['name']:
                preferred.append(d['udid'])
              elif 'iPhone' in d['name']:
                fallback.append(d['udid'])
          result = preferred[0] if preferred else (fallback[0] if fallback else '')
          print(result)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Selected simulator: $UDID"
          # Boot the simulator and block until it is fully in Booted state
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID"

      # ── Build for simulator ─────────────────────────────────────────
      - name: Build iOS app (Simulator)
        run: |
          set -o pipefail
          WORKSPACE=$(find ios -name '*.xcworkspace' -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v 'Schemes:' | head -1 | xargs)
          echo "Building workspace=$WORKSPACE scheme=$SCHEME udid=$SIMULATOR_UDID"
          # Use Debug (not Release) — Release needs code signing; simulators use Debug.
          # Skip xcpretty so xcodebuild's real exit code is propagated.
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcode.log
          exit ${PIPESTATUS[0]}
        env:
          NSUnbufferedIO: YES

      # ── Install into the already-booted simulator ───────────────────
      - name: Install app in simulator
        run: |
          # Use xcodebuild -showBuildSettings to get the EXACT product path.
          # find -maxdepth 1 can still pick up test bundles (e.g. *Tests.app)
          # that lack CFBundleIdentifier, causing xcrun simctl install to exit 65.
          WORKSPACE=$(find ios -name '*.xcworkspace' -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v 'Schemes:' | head -1 | xargs)
          SETTINGS=$(xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIMULATOR_UDID" \
            CODE_SIGNING_ALLOWED=NO \
            -showBuildSettings 2>/dev/null)
          BUILT_DIR=$(echo "$SETTINGS" | grep 'BUILT_PRODUCTS_DIR' | head -1 \
            | sed 's/.*= //' | xargs)
          PRODUCT=$(echo "$SETTINGS" | grep 'FULL_PRODUCT_NAME' | head -1 \
            | sed 's/.*= //' | xargs)
          APP_PATH="$BUILT_DIR/$PRODUCT"
          echo "Resolved: WORKSPACE=$WORKSPACE SCHEME=$SCHEME"
          echo "APP_PATH=$APP_PATH"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: app not found at $APP_PATH" >&2
            find ios/build/Build/Products -maxdepth 3 -name '*.app' -type d 2>/dev/null >&2 || true
            exit 1
          fi
          # Verify bundle ID is present (diagnoses exit-65 'Missing bundle ID')
          BID=$(plutil -extract CFBundleIdentifier raw "$APP_PATH/Info.plist" 2>/dev/null || echo '')
          echo "CFBundleIdentifier=$BID"
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      # ── Maestro ─────────────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro test maestro/

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: |
            ~/.maestro/tests/
          retention-days: 7

  # ─── Android Emulator e2e (Maestro) ─────────────────────────────────────────
  #
  # Builds the Expo demo app for Android and runs the same Maestro flows as iOS.
  # ubuntu-latest has KVM support, making emulator startup ~3× faster than macOS.

  e2e-android:
    name: Android e2e (Maestro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/expo-todo
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_ADAPTER: loki-memory

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Enable KVM for hardware-accelerated emulator ────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Build the library ───────────────────────────────────────────
      - name: Install root deps
        run: npm ci
        working-directory: .

      - name: Build library
        run: npm run build
        working-directory: .

      - name: Pack library tarball
        run: npm pack
        working-directory: .

      # ── Prepare the demo app ────────────────────────────────────────
      - name: Install demo deps
        run: npm install --no-package-lock

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK (debug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: demos/expo-todo/android

      # ── Accept SDK licenses + pre-install emulator & system image ────
      # 'emulator' is NOT pre-installed on ubuntu-latest; install it explicitly
      # so the reactivecircus action can find it. API 29 is the most stable level.
      - name: Install Android emulator packages
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "emulator" "system-images;android-29;default;x86_64"
        working-directory: .

      # ── Install Maestro ─────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Launch emulator, install APK, run Maestro flows ─────────────
      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            APK=$(find demos/expo-todo/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
            echo "Installing APK: $APK"
            adb install "$APK"
            $HOME/.maestro/bin/maestro test demos/expo-todo/maestro/

      - name: Upload Maestro output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-report
          path: ~/.maestro/tests/
          retention-days: 7

  # ─── Podspec lint ────────────────────────────────────────────────────────────
  #
  # Uses macOS to validate that the podspec metadata is well-formed.
  # Full compilation validation requires pods to be installed (see iosTest TODO).

  podspec-lint:
    name: Podspec lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Lint podspec (metadata only)
        run: pod spec lint PomegranateDB.podspec --allow-warnings --quick
        # --quick skips compilation, which needs React-Core pods installed.
        # Real compilation test happens in the iosTest project (TODO).
