appId: com.barerntodo
name: Run benchmarks
onFlowError:
  - takeScreenshot: benchmark-ERROR
---
- stopApp
- launchApp:
    appId: com.barerntodo

# ── App loads ──────────────────────────────────────────────────────────────
- assertVisible: "PomegranateDB"
- takeScreenshot: benchmark-01-app-loaded

# ── Navigate to benchmarks tab ────────────────────────────────────────────
- tapOn:
    id: "tab-benchmarks"
- waitForAnimationToEnd
- assertVisible:
    id: "benchmark-title"
- takeScreenshot: benchmark-02-tab-opened

# ── Run benchmarks ────────────────────────────────────────────────────────
- tapOn:
    id: "benchmark-btn"

# Wait for benchmarks to complete (may take several minutes on CI emulators)
- extendedWaitUntil:
    visible:
      id: "benchmark-complete"
    timeout: 600000

- takeScreenshot: benchmark-03-results

# ── Verify results are displayed ──────────────────────────────────────────
- assertVisible:
    id: "benchmark-summary"
- takeScreenshot: benchmark-04-done
