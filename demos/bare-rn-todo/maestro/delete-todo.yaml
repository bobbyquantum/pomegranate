appId: com.barerntodo
name: Delete a todo
---
- stopApp
- launchApp:
    appId: com.barerntodo

# Wait for app to fully load
- assertVisible: "PomegranateDB"

# Seed sample todos (avoids keyboard; proven reliable across all adapters)
- tapOn:
    id: "seed-btn"
- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000

# Delete the first todo
- tapOn:
    id: "todo-delete"
    index: 0

# Verify stats updated (at least one todo should remain from seed)
- assertVisible:
    id: "stats-text"
