appId: com.barerntodo
name: Add a todo
---
- stopApp
- launchApp:
    appId: com.barerntodo

# Wait for the app to fully load
- assertVisible: "PomegranateDB"

# Type a new todo and submit via Enter (dismisses keyboard reliably on both platforms)
- tapOn:
    id: "todo-input"
- inputText: "Buy milk"
- assertVisible: "Buy milk"
- pressKey: Enter

# Explicitly dismiss keyboard and wait for layout to settle
- hideKeyboard
- waitForAnimationToEnd

# Verify a todo item appeared
- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000

# Verify stats are visible
- assertVisible:
    id: "stats-text"
