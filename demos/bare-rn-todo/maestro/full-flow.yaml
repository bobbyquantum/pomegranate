appId: com.barerntodo
name: Full CRUD flow
onFlowError:
  - takeScreenshot: full-crud-ERROR
---
- stopApp
- launchApp:
    appId: com.barerntodo

# ── App loads ──────────────────────────────────────────────────────────────
- assertVisible: "PomegranateDB"
- takeScreenshot: full-crud-01-app-loaded

# ── Add a todo ───────────────────────────────────────────────────────────
- tapOn:
    id: "todo-input"
- inputText: "Maestro test todo"
- assertVisible: "Maestro test todo"
- takeScreenshot: full-crud-02-text-entered

# Tap the add button (more reliable than pressKey: Enter across API levels)
- tapOn:
    id: "add-todo-btn"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000
- takeScreenshot: full-crud-03-todo-created

# ── Toggle it complete ─────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "todo-checkbox"
    timeout: 10000
- tapOn:
    id: "todo-checkbox"
    index: 0
- takeScreenshot: full-crud-04-toggled

# ── Seed sample data ──────────────────────────────────────────────────────
- tapOn:
    id: "seed-btn"

# Wait for seed to render
- waitForAnimationToEnd
- takeScreenshot: full-crud-05-seeded

# ── Clear completed ───────────────────────────────────────────────────────
- tapOn:
    id: "clear-completed-btn"
- takeScreenshot: full-crud-06-cleared

# ── Verify stats are visible ──────────────────────────────────────────────
- assertVisible:
    id: "stats-text"
- takeScreenshot: full-crud-07-done
