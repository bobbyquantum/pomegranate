appId: com.pomegranatedb.todo.demo
name: Full CRUD flow
---
# ── App loads (30s for slow CI emulators) ─────────────────────────────────
- assertVisible:
    text: "PomegranateDB"
    timeout: 30000
- assertVisible: "Reactive offline-first database"

# ── Add a todo ─────────────────────────────────────────────────────────────
- tapOn:
    id: "todo-input"
- inputText: "Maestro test todo"
- tapOn:
    id: "add-todo-btn"
- assertVisible: "Maestro test todo"

# ── Toggle it complete ─────────────────────────────────────────────────────
- tapOn:
    id: "todo-checkbox"
    index: 0

# ── Seed sample data ──────────────────────────────────────────────────────
- tapOn:
    id: "seed-btn"
- assertVisible: "Buy groceries 🛒"
- assertVisible: "Walk the dog 🐕"

# ── Clear completed ───────────────────────────────────────────────────────
- tapOn:
    id: "clear-completed-btn"

# ── Verify remaining todos are still visible ─────────────────────────────
- assertVisible: "remaining"
