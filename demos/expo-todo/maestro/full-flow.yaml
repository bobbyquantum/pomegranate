appId: com.pomegranatedb.todo.demo
name: Full CRUD flow
---
- launchApp:
    appId: com.pomegranatedb.todo.demo
    clearState: true

# ── App loads ──────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible: "PomegranateDB"
    timeout: 30000
- assertVisible: "Reactive offline-first database"

# ── Add a todo ─────────────────────────────────────────────────────────────
- tapOn:
    id: "todo-input"
- inputText: "Maestro test todo"
- hideKeyboard
- tapOn:
    id: "add-todo-btn"
- extendedWaitUntil:
    visible: "Maestro test todo"
    timeout: 10000

# ── Toggle it complete ─────────────────────────────────────────────────────
- tapOn:
    id: "todo-checkbox"
    index: 0

# ── Seed sample data ──────────────────────────────────────────────────────
- tapOn:
    id: "seed-btn"
- extendedWaitUntil:
    visible: "Buy groceries"
    timeout: 10000
- assertVisible: "Walk the dog"

# ── Clear completed ───────────────────────────────────────────────────────
- tapOn:
    id: "clear-completed-btn"

# ── Verify remaining todos are still visible ─────────────────────────────
- extendedWaitUntil:
    visible: "remaining"
    timeout: 10000
