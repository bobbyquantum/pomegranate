appId: com.pomegranatedb.todo.demo
name: Full CRUD flow
onFlowError:
  - takeScreenshot: full-crud-ERROR
---
- stopApp
- launchApp:
    appId: com.pomegranatedb.todo.demo

# ── App loads ──────────────────────────────────────────────────────────────
- assertVisible: "PomegranateDB"
- assertVisible: "Reactive offline-first database"
- takeScreenshot: full-crud-01-app-loaded

# ── Select adapter via picker ─────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "adapter-option-${ADAPTER}"
    timeout: 30000
- tapOn:
    id: "adapter-option-${ADAPTER}"
- extendedWaitUntil:
    visible:
      id: "tab-todos"
    timeout: 30000
- takeScreenshot: full-crud-02-adapter-selected

# ── Add a todo ───────────────────────────────────────────────────────────
- tapOn:
    id: "todo-input"
- inputText: "Maestro test todo"
- waitForAnimationToEnd
- takeScreenshot: full-crud-03-text-entered

# Tap the add button (more reliable than pressKey: Enter across API levels)
- tapOn:
    id: "add-todo-btn"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000
- takeScreenshot: full-crud-04-todo-created

# ── Toggle it complete ─────────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "todo-checkbox"
    timeout: 10000
- tapOn:
    id: "todo-checkbox"
    index: 0
- takeScreenshot: full-crud-05-toggled

# ── Seed sample data ──────────────────────────────────────────────────────
- tapOn:
    id: "seed-btn"

# Wait for seed to render
- waitForAnimationToEnd
- takeScreenshot: full-crud-06-seeded

# ── Clear completed ───────────────────────────────────────────────────────
- tapOn:
    id: "clear-completed-btn"
- takeScreenshot: full-crud-07-cleared

# ── Verify stats are visible ──────────────────────────────────────────────
- assertVisible:
    id: "stats-text"
- takeScreenshot: full-crud-08-done
