appId: com.pomegranatedb.todo.demo
name: Delete a todo
---
- stopApp
- launchApp:
    appId: com.pomegranatedb.todo.demo

# Wait for app to fully load
- assertVisible: "PomegranateDB"

# Add a todo to delete (pressKey: Enter submits and dismisses keyboard)
- tapOn:
    id: "todo-input"
- inputText: "Delete me"
- pressKey: Enter
- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000

# Dismiss keyboard by tapping a focusable element above the keyboard area.
# "PomegranateDB" header is non-focusable, so it won't dismiss the keyboard
# on Android.  The "All" filter tab is focusable and already active (no-op).
- tapOn: "All"
- waitForAnimationToEnd

# Delete it
- tapOn:
    id: "todo-delete"

# Verify it's gone (wait for UI update)
- extendedWaitUntil:
    notVisible:
      id: "todo-item"
    timeout: 10000
