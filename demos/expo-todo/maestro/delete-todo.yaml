appId: com.pomegranatedb.todo.demo
name: Delete a todo
---
- stopApp
- launchApp:
    appId: com.pomegranatedb.todo.demo

# Wait for app to fully load
- assertVisible: "PomegranateDB"

# Add a todo to delete
- tapOn:
    id: "todo-input"
- inputText: "Delete me"
# Submit via Enter key (reliable across all adapters on Android)
- pressKey: Enter

# Wait for the todo to appear
- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000

# Dismiss keyboard by tapping a non-input element
- tapOn:
    id: "stats-text"
- waitForAnimationToEnd

# Scroll if needed so the delete button is visible
- scrollUntilVisible:
    element:
      id: "todo-delete"
    direction: UP
    timeout: 5000

# Delete it
- tapOn:
    id: "todo-delete"

# Verify it's gone (wait for UI update)
- extendedWaitUntil:
    notVisible:
      id: "todo-item"
    timeout: 10000
