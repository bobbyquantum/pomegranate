appId: com.pomegranatedb.todo.demo
name: Delete a todo
---
- launchApp:
    appId: com.pomegranatedb.todo.demo
    clearState: true

# Wait for app to fully load
- assertVisible: "PomegranateDB"

# Add a todo to delete (pressKey: Enter submits and dismisses keyboard)
- tapOn:
    id: "todo-input"
- inputText: "Delete me"
- pressKey: Enter
- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000

# Delete it
- tapOn:
    id: "todo-delete"
    index: 0

# Verify it's gone (wait for UI update)
- extendedWaitUntil:
    notVisible:
      id: "todo-item"
    timeout: 10000
