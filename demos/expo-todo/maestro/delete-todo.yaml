appId: com.pomegranatedb.todo.demo
name: Delete a todo
---
- launchApp:
    appId: com.pomegranatedb.todo.demo
    clearState: true

# Wait for app to fully load
- extendedWaitUntil:
    visible: "PomegranateDB"
    timeout: 30000

# Add a todo to delete
- tapOn:
    id: "todo-input"
- inputText: "Delete me"
- hideKeyboard
- tapOn:
    id: "add-todo-btn"
- extendedWaitUntil:
    visible: "Delete me"
    timeout: 10000

# Delete it
- tapOn:
    id: "todo-delete"
    index: 0

# Verify it's gone
- assertNotVisible: "Delete me"
