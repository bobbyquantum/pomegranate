appId: com.pomegranatedb.todo.demo
name: Delete a todo
---
- launchApp:
    appId: com.pomegranatedb.todo.demo

# Wait for app to fully load
- assertVisible: "PomegranateDB"

# Add a todo to delete
- tapOn:
    id: "todo-input"
- inputText: "Delete me"
- hideKeyboard
- tapOn:
    id: "add-todo-btn"
- extendedWaitUntil:
    visible: "Delete me"
    timeout: 15000

# Delete it
- tapOn:
    id: "todo-delete"
    index: 0

# Verify it's gone (wait for UI update)
- extendedWaitUntil:
    notVisible: "Delete me"
    timeout: 10000
