appId: com.pomegranatedb.todo.demo
name: Delete a todo
---
# Wait for app (30s for slow CI emulators)
- assertVisible:
    text: "PomegranateDB"
    timeout: 30000

# Add a todo to delete
- tapOn:
    id: "todo-input"
- inputText: "Delete me"
- tapOn:
    id: "add-todo-btn"
- assertVisible: "Delete me"

# Delete it
- tapOn:
    id: "todo-delete"
    index: 0

# Verify it's gone
- assertNotVisible: "Delete me"
