appId: com.pomegranatedb.todo.demo
name: Delete a todo
---
- stopApp
- launchApp:
    appId: com.pomegranatedb.todo.demo

# Wait for app to fully load
- assertVisible: "PomegranateDB"

# Add a todo to delete (tap button triggers handleAdd which dismisses keyboard)
- tapOn:
    id: "todo-input"
- inputText: "Delete me"
- tapOn:
    id: "add-todo-btn"
- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000

# Wait for keyboard dismiss animation (Keyboard.dismiss() called in handleAdd)
- waitForAnimationToEnd

# Delete it
- tapOn:
    id: "todo-delete"

# Verify it's gone (wait for UI update)
- extendedWaitUntil:
    notVisible:
      id: "todo-item"
    timeout: 10000
