appId: com.pomegranatedb.todo.demo
name: Delete a todo
---
- stopApp
- launchApp:
    appId: com.pomegranatedb.todo.demo

# Wait for app to fully load
- assertVisible: "PomegranateDB"

# Add a todo to delete
- tapOn:
    id: "todo-input"
- inputText: "Delete me"
- tapOn:
    id: "add-todo-btn"
- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000

# Dismiss keyboard by tapping the filter area (above keyboard, non-input)
- tapOn:
    point: "50%,45%"
- waitForAnimationToEnd

# Delete it
- tapOn:
    id: "todo-delete"

# Verify it's gone (wait for UI update)
- extendedWaitUntil:
    notVisible:
      id: "todo-item"
    timeout: 10000
