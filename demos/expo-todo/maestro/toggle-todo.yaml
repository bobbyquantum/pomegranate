appId: com.pomegranatedb.todo.demo
name: Toggle a todo
---
- launchApp:
    appId: com.pomegranatedb.todo.demo
    clearState: true

# Wait for app to fully load
- extendedWaitUntil:
    visible: "PomegranateDB"
    timeout: 30000

# Seed sample todos
- tapOn:
    id: "seed-btn"
- extendedWaitUntil:
    visible: "Buy groceries"
    timeout: 10000

# Toggle the first todo
- tapOn:
    id: "todo-checkbox"
    index: 0

# Verify stats changed (at least 1 done)
- extendedWaitUntil:
    visible: "done"
    timeout: 10000
