appId: com.pomegranatedb.todo.demo
name: Add a todo
---
- launchApp:
    appId: com.pomegranatedb.todo.demo

# Wait for the app to fully load
- assertVisible: "PomegranateDB"

# Type a new todo
- tapOn:
    id: "todo-input"
- inputText: "Buy milk"
- hideKeyboard
- tapOn:
    id: "add-todo-btn"

# Verify the todo appears
- extendedWaitUntil:
    visible: "Buy milk"
    timeout: 15000

# Verify stats updated
- assertVisible: "REMAINING"
