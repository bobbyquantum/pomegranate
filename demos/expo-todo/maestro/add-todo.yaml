appId: com.pomegranatedb.todo.demo
name: Add a todo
onFlowError:
  - takeScreenshot: add-todo-ERROR
---
- stopApp
- launchApp:
    appId: com.pomegranatedb.todo.demo

# Wait for the app to fully load
- assertVisible: "PomegranateDB"
- takeScreenshot: add-01-app-loaded

# Type a new todo and submit via Enter (dismisses keyboard reliably on both platforms)
- tapOn:
    id: "todo-input"
- inputText: "Buy milk"
- extendedWaitUntil:
    visible: "Buy milk"
    timeout: 10000
- takeScreenshot: add-02-text-entered

# Tap the add button (more reliable than pressKey: Enter across API levels)
- tapOn:
    id: "add-todo-btn"
- waitForAnimationToEnd

# Verify a todo item appeared
- extendedWaitUntil:
    visible:
      id: "todo-item"
    timeout: 15000
- takeScreenshot: add-03-todo-created

# Verify stats are visible
- assertVisible:
    id: "stats-text"
- takeScreenshot: add-04-done
