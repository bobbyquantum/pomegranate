appId: com.pomegranatedb.todo.demo
name: Add a todo
---
# Wait for the app to load (30s for slow CI emulators)
- assertVisible:
    text: "PomegranateDB"
    timeout: 30000

# Type a new todo
- tapOn:
    id: "todo-input"
- inputText: "Buy milk"
- tapOn:
    id: "add-todo-btn"

# Verify the todo appears
- assertVisible: "Buy milk"

# Verify stats updated
- assertVisible: "remaining"
